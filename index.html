    <h1 class="title">Koko's Project Catalog</h1>
    <div id="controls-bar">
      <input type="text" id="search-input" placeholder="Search projects..." />
      <select id="category-select">
        <option value="All">All Categories</option>
      </select>
    </div>
  </header>
  <div id="card-container"></div>
  <div id="detail-overlay">
    <div id="detail-panel">
      <div class="detail-header">
        <h2 id="detail-title">Project Title</h2>
        <button onclick="closeProjectDetails()">Close</button>
      </div>
      <div id="detail-carousel">
        <img id="detail-image" src="" alt="" />
        <video id="detail-video" controls style="display:none"></video>
        <button id="carousel-prev" onclick="showPreviousDetailImage()" style="display:none">&#8249;</button>
        <button id="carousel-next" onclick="showNextDetailImage()" style="display:none">&#8250;</button>
        <span id="carousel-counter" style="display:none"></span>
      </div>
      <p id="detail-meta"></p>
      <p id="detail-achievement"></p>
      <p id="detail-long-desc"></p>
      <p id="detail-tech"></p>
      <ul id="detail-highlights"></ul>
      <div id="detail-links"></div>
    </div>
  </div>
  <div class="card" style="display: none">
    <div class="card-content">
      <h2>Project Title</h2>
      <img src="" alt="Project Image" />
      <p class="card-description">Short description</p>
      <ul>
        <li>Bullet Point 1</li>
        <li>Bullet Point 2</li>
        <li>Bullet Point 3</li>
      </ul>
    </div>
  </div>
  <div class="footer">
    <button onclick="reloadCatalog()">Reload Catalog</button>
    <button onclick="removeLastProject()">Remove Last Project</button>
  </div>
